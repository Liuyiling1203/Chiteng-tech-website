[build]
  publish = "public"
  command = "hugo --gc --minify"

[build.environment]
  HUGO_VERSION = "0.123.7"
  NODE_VERSION = "18"
  
[context.production.environment]
  HUGO_ENV = "production"

# 重定向規則
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 頭部設置
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"